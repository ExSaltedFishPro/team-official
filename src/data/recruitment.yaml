intro: "C.A.T. Team欢迎对网络安全充满好奇心、有耐心并且愿意持续练习的学习者加入我们的旅程。无论你的基础如何，我们都欢迎你来一起探索网络安全的未来。"

tracks:
  - "Web"
  - "Pwn"
  - "Reverse"
  - "Crypto"
  - "Misc"

targets:
  - "喜欢一步步解决技术问题，享受过程的同学。"
  - "想系统入门安全与 CTF 的初学者。"
  - "迎难而上、不怕在困难问题上花时间的同学。"

requirements:
  - title: "有好奇心"
    description: "不用一开始就什么都会，但要愿意看资料、动手试，也愿意多问一句“为什么”。"
  - title: "有耐心"
    description: "CTF 题目往往需要一步步分析、调试和尝试，可能会遇到挫折，但只要坚持下去，成功的喜悦会非常值得。"


faq:
  - question: "需要有 CTF 经验吗？"
    answer: "不要求。有耐心、愿意学、也愿意持续练习的同学，都欢迎加入。"
  - question: "一开始该选哪个方向？"
    answer: "可以先从自己最感兴趣的方向入手。做过几次训练任务后，我们也会帮你一起判断和细化。"

contact:
  label: "联系邮箱"
  value: "likaijie@njust.edu.cn"
  href: "mailto:likaijie@njust.edu.cn"
  note: "C.A.T. Team在每年的秋季学期举办招新赛、招募新成员，欢迎有兴趣的同学在此期间联系我们。如果不在招新期间，也欢迎随时发邮件咨询。"
