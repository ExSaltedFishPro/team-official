sections:
  about:
    eyebrow: "About"
    title: "厚积无声，锋芒自现"
    description: "C.A.T. Team是南京理工大学的网络安全校队，隶属于学校X·Space创客空间网安创新工作室，由计算机学院和网络空间安全学院的本科生和研究生组成。我们相信厚积薄发，只有通过扎实的训练和持续的积累，才能捕捉到赛场上的灵光一现。"
    values:
      - "以练砺刃"
      - "以思破局"
      - "以协成势"
      - "以赛证道"
  members:
    eyebrow: "Members"
    title: "我们的团队"
    description: "来自不同年级、方向和角色的成员组成了C.A.T. Team这个多元化的团队。"
  honors:
    eyebrow: "Honors"
    title: "代表性的成绩与认可"
    description: "C.A.T. Team在国内外的CTF竞赛中取得了多项代表性的成绩与广泛认可。"
  timeline:
    eyebrow: "Timeline"
    title: "一步一步，走到今天"
    description: "C.A.T. Team的成长历程充满了挑战和机遇，每一步都见证了团队的努力和进步。"
  recruitment:
    eyebrow: "Recruitment"
    title: "加入下一段旅程"
    description: "C.A.T. Team 希望更多的新鲜血液加入我们，共同建设这个充满活力和创造力的团队。"

