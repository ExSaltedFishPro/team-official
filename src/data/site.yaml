seo:
  title: "C.A.T. Team"
  description: "C.A.T. Team是南京理工大学的一支学生CTF队伍，致力于培养对网络安全充满热情的学生。我们以克制的方法，做扎实的训练，塑造了一支由不同年级、方向和角色的成员组成的团队。我们重视基础、协作和优雅的解题方式，欢迎对网络安全充满好奇心、耐心和愿意持续练习的学习者加入我们的旅程。"
  siteUrl: "https://cat-team.online"
  ogImage: "/og-card.svg"
  favicon: "/favicon.png"
  lang: "cn"

